name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage gate
        env:
          TESTING: "1"
        run: |
          PYTHONPATH=. python -m pytest tests/ -v --cov=synaptic_bridge \
            --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Domain coverage gate (>=95%)
        env:
          TESTING: "1"
        run: |
          PYTHONPATH=. python -m pytest tests/domain -v \
            -o addopts="" \
            --cov=synaptic_bridge.domain --cov-report=term-missing \
            --cov-fail-under=95

      - name: Application coverage gate (>=85%)
        env:
          TESTING: "1"
        run: |
          PYTHONPATH=. python -m pytest tests/application -v \
            -o addopts="" \
            --cov=synaptic_bridge.application --cov-report=term-missing \
            --cov-fail-under=85

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run linter
        run: |
          ruff check synaptic_bridge/ tests/

  boundaries:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Verify architectural boundaries (import-linter)
        run: lint-imports

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          pip install bandit pip-audit cyclonedx-bom

      - name: Run Bandit security scan
        run: |
          bandit -r synaptic_bridge/ -ll --skip B101,B324,B108,B104

      - name: Run pip-audit dependency check
        run: |
          pip install -e .
          pip-audit --strict --requirement requirements.lock

      - name: Verify lockfile is up-to-date
        run: |
          pip install pip-tools
          python -m piptools compile --quiet --output-file /tmp/requirements.lock.new pyproject.toml
          diff -u requirements.lock /tmp/requirements.lock.new

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install -e .
          cyclonedx-py environment --output-format json --output-file sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, boundaries, security]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t synaptic-bridge:test .

      - name: Test container health
        run: |
          docker run -d --name test-app -p 8000:8000 \
            -e JWT_SECRET=ci-test-secret-$(openssl rand -hex 16) \
            -e WORM_SECRET_KEY=ci-test-worm-$(openssl rand -hex 16) \
            -e TESTING=1 \
            synaptic-bridge:test
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-app
