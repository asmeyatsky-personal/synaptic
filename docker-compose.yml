version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - WORM_SECRET_KEY=${WORM_SECRET_KEY:?WORM_SECRET_KEY is required}
      - DUCKDB_PATH=/data/synaptic_bridge.duckdb
      - SPIRE_SOCKET_PATH=/tmp/spire-agent.sock
      - ENFORCE_HTTPS=1
    volumes:
      - ./data:/data
      - /var/run/spire:/var/run/spire:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - synaptic-internal
    read_only: true
    tmpfs:
      - /tmp

  cli:
    build: .
    volumes:
      - ./data:/data
    environment:
      - DUCKDB_PATH=/data/synaptic_bridge.duckdb
    command: ["python", "-m", "synaptic_bridge.presentation.cli.main"]
    networks:
      - synaptic-internal

networks:
  synaptic-internal:
    driver: bridge
